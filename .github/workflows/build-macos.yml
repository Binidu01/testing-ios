name: Build and Test macOS App

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build-macos:
    runs-on: macos-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install CLI dependencies
        run: npm install

      # ⭐ Setup Rust for BOTH macOS architectures
      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin,x86_64-apple-darwin

      # ⭐ Install both targets explicitly (backup)
      - name: Install macOS Rust targets
        run: |
          rustup target add aarch64-apple-darwin
          rustup target add x86_64-apple-darwin

      # ⭐ Generate macOS project
      - name: Generate macOS project
        run: |
          node dist/index.js my-macos-app \
            --platform macos \
            --typescript \
            --tailwind \
            --nosign \
            --npm \
            --app-name "My macOS App" \
            --force

      # ⭐ Add tauri script
      - name: Add tauri script
        run: |
          cd my-macos-app
          npm pkg set scripts.tauri="npx @tauri-apps/cli"

      # ⭐ Run dev server to wire bini-native
      - name: Wire native plugins
        continue-on-error: true
        run: |
          cd my-macos-app
          echo "🔧 Starting dev server to wire bini-native..."
          npm run dev &
          DEV_PID=$!
          sleep 20
          kill $DEV_PID 2>/dev/null || true
          echo "✅ Native plugins wired"

      # ⭐ Build frontend
      - name: Build frontend
        run: |
          cd my-macos-app
          npm run build

      # ⭐ Build for macOS (Apple Silicon)
      - name: Build macOS app (Apple Silicon)
        run: |
          cd my-macos-app
          npm run tauri -- build --target aarch64-apple-darwin

      # ⭐ Upload Apple Silicon build
      - name: Upload Apple Silicon .app
        uses: actions/upload-artifact@v4
        with:
          name: macos-app-silicon
          path: my-macos-app/src-tauri/target/aarch64-apple-darwin/release/bundle/macos/*.app

      # ⭐ Upload Apple Silicon .dmg
      - name: Upload Apple Silicon .dmg
        uses: actions/upload-artifact@v4
        with:
          name: macos-dmg-silicon
          path: my-macos-app/src-tauri/target/aarch64-apple-darwin/release/bundle/dmg/*.dmg
