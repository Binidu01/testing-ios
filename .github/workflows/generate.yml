name: Generate and Build iOS App

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-ios:
    runs-on: macos-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install CLI dependencies
        run: npm install

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-ios

      - name: Install iOS Rust targets
        run: |
          rustup target add aarch64-apple-ios
          rustup target add aarch64-apple-ios-sim
          rustup target add x86_64-apple-ios

      - name: Generate iOS project
        run: |
          node dist/index.js my-ios-app \
            --platform ios \
            --typescript \
            --tailwind \
            --nosign \
            --npm \
            --app-name "My iOS App" \
            --force

      # ⭐ Manual wiring - don't use tauri ios dev at all in CI
      - name: Generate App.tsx with bini-router
        run: |
          cd my-ios-app
          echo "🔧 Generating App.tsx with bini-router..."
          # Just run the dev server briefly to trigger bini-router
          npm run dev &
          DEV_PID=$!
          sleep 15
          kill $DEV_PID 2>/dev/null || true
          echo "✅ App.tsx generated"

      # ⭐ Build frontend
      - name: Build frontend
        run: |
          cd my-ios-app
          npm run build

      # ⭐ Build for iOS Simulator - specify device explicitly
      - name: Build for iOS Simulator
        run: |
          cd my-ios-app
          # List available simulators
          xcrun simctl list devices available
          # Build without trying to run the Simulator
          npx @tauri-apps/cli ios build --target aarch64-sim

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ios-simulator-build
          path: my-ios-app/src-tauri/gen/apple/build/Products/Release-iphonesimulator/
