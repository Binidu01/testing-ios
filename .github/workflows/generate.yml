name: Generate and Build iOS App

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-ios:
    runs-on: macos-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install CLI dependencies
        run: npm install

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-ios

      - name: Install iOS Rust targets
        run: |
          rustup target add aarch64-apple-ios
          rustup target add aarch64-apple-ios-sim
          rustup target add x86_64-apple-ios

      - name: Generate iOS project
        run: |
          node dist/index.js my-ios-app \
            --platform ios \
            --typescript \
            --tailwind \
            --nosign \
            --npm \
            --app-name "My iOS App" \
            --force

      # ⭐ Add tauri script for Xcode
      - name: Add tauri script
        run: |
          cd my-ios-app
          npm pkg set scripts.tauri="npx @tauri-apps/cli"

      # ⭐ Run dev server to wire bini-native
      - name: Wire native plugins
        continue-on-error: true
        run: |
          cd my-ios-app
          echo "🔧 Starting dev server to wire bini-native..."
          npm run dev &
          DEV_PID=$!
          sleep 25
          kill $DEV_PID 2>/dev/null || true
          echo "✅ Native plugins wired"

      - name: Build frontend
        run: |
          cd my-ios-app
          npm run build

      - name: Build for iOS Simulator
        run: |
          cd my-ios-app
          npm run tauri -- ios build --target aarch64-sim

      # ⭐ FIXED: Correct artifact path
      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ios-simulator-build
          path: my-ios-app/src-tauri/gen/apple/build/arm64-sim/My\ iOS\ App.app
